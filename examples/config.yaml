# Songbird Configuration Example
# This file demonstrates the YAML structure for ambient sound synthesis

sample_rate: 44100
sample_dir: "./samples"

voices:
  # Continuous mode example: water splattering (overlapping samples with crossfading)
  - id: water
    mode: continuous
    pan: -0.3
    overlap_ms: 500
    samples:
      - water_splash_1
      - water_splash_2
      - water_splash_3

  # Discrete mode example: rain drops (random, non-overlapping events)
  - id: rain
    mode: discrete
    pan: 0.2
    probability: 0.5
    samples:
      - raindrop_1
      - raindrop_2
      - raindrop_light
    min_delay_ms: 100
    max_delay_ms: 500

  # Another continuous voice: ambience
  - id: wind
    mode: continuous
    pan: 0.5
    overlap_ms: 750
    samples:
      - wind_gust_1
      - wind_gust_2
